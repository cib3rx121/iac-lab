---
- name: Lab baseline check
  hosts: lab
  gather_facts: true

  tasks:
    - name: Show OS family from facts
      ansible.builtin.debug:
        msg: "OS family is {{ ansible_os_family }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Uptime on target
      ansible.builtin.command: uptime
      changed_when: false
